# Netlify Configuration for Zen Aquarium
# Version 0.5 (Safety & Guidance Update)

[build]
  # Build command (adjust based on your package manager)
  command = "npm run build"
  
  # Output directory (Vite default is 'dist', CRA is 'build')
  publish = "dist"
  
  # Base directory (if your app is in a subdirectory)
  # base = ""

[build.environment]
  # Node version
  NODE_VERSION = "18"
  
  # IMPORTANT: Include devDependencies (vite, etc.) during install
  NPM_FLAGS = "--include=dev"

# SPA Redirect - All routes to index.html for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for WebXR and Security
[[headers]]
  for = "/*"
  [headers.values]
    # Required for WebXR to work properly
    X-Frame-Options = "SAMEORIGIN"
    
    # Enable CORS for XR features
    Access-Control-Allow-Origin = "*"
    
    # Security headers
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Permissions Policy for camera/sensors (needed for AR)
    Permissions-Policy = "camera=(*), gyroscope=(*), accelerometer=(*), magnetometer=(*), xr-spatial-tracking=(*)"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML (for updates)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Context-specific settings for production
[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"
